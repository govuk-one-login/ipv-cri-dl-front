name: Development Docker build, ECR push, template copy to S3
on:
  push:
    branches:
      - main
  workflow_dispatch: # deploy manually

jobs:
  test-image-build-and-push:
    name: Build and push test image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: govuk-one-login/devplatform-upload-action-ecr@f82c8774a6390f200b15112b3cbb9faf3442173c
        with:
          role-to-assume-arn: ${{ secrets.AWS_DL_DEV_ROLE_ARN }}
          build-and-push-image-only: true
          artifact-bucket-name: ''
          ecr-repo-name: ${{ secrets.DEV_ECR_REPOSITORY_TEST }}
          dockerfile: test/Dockerfile
          push-latest-tag: true
          container-sign-kms-key-arn: ${{ secrets.DEV_CONTAINER_SIGN_KMS_KEY }}

  app-image-build-and-push:
    name: Build and push app image
    runs-on: ubuntu-latest
    needs: test-image-build-and-push
    env:
      AWS_REGION: eu-west-2
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: "0"

      - name: Set up AWS creds
        uses: aws-actions/configure-aws-credentials@acca2b1b2070338fb9fd1ca27ecee81d687e58e5 # v6.1.2
        with:
          role-to-assume: ${{ secrets.AWS_DL_DEV_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Setup SAM
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v2
        with:
          use-installer: true
          version: "1.157.1"

      - name: SAM Validate
        run: sam validate --region ${{ env.AWS_REGION }} -t deploy/template.yaml --lint

      # Likely source of node warning
      # https://github.com/aws-actions/amazon-ecr-login/issues/586
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5

      - name: Login to GDS Dev Dynatrace Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: khw46367.live.dynatrace.com
          username: khw46367
          password: ${{ secrets.DYNATRACE_PAAS_TOKEN }}

      - name: "Push signed image to ECR, updated SAM template with image then upload it to the S3 Artifact Bucket"
        uses: govuk-one-login/devplatform-upload-action-ecr@f82c8774a6390f200b15112b3cbb9faf3442173c # v1.5.0
        with:
          artifact-bucket-name: ${{ secrets.DEV_ARTIFACT_BUCKET }}
          container-sign-kms-key-arn: ${{ secrets.DEV_CONTAINER_SIGN_KMS_KEY }}
          template-file: deploy/template.yaml
          role-to-assume-arn: ${{ secrets.AWS_DL_DEV_ROLE_ARN }}
          ecr-repo-name: ${{ secrets.DEV_ECR_REPOSITORY }}
          docker-platform: linux/amd64
